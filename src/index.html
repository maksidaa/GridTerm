<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; frame-src *">
  <title>GridTerm</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="../node_modules/xterm/css/xterm.css">
</head>
<body>
  <div id="titlebar">
    <button id="sidebar-toggle" class="titlebar-btn-left" title="Toggle Sidebar">◂◂</button>
    <span class="title">GridTerm</span>
    <div class="layout-selector" data-tooltip="Choose how many panes are visible at once — scroll to see the rest">
      <button class="layout-btn" data-layout="1" title="Full screen — one pane at a time">1x1</button>
      <button class="layout-btn selected" data-layout="auto" title="Auto — fit all panes">Auto</button>
      <button class="layout-btn" data-layout="4" title="2x2 grid — scroll for more">2x2</button>
      <button class="layout-btn" data-layout="9" title="3x3 grid — scroll for more">3x3</button>
    </div>
    <div class="titlebar-directory-selector">
      <select id="titlebar-directory" title="Working Directory">
        <option value="">📁 Directory</option>
      </select>
    </div>
    <button id="settings-btn" class="titlebar-btn-right" title="Settings" data-tooltip="App settings and preferences">⚙</button>
  </div>

  <div id="main-container">
    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-header" data-section="panes">Open Panes <span class="collapse-icon">▼</span></div>
        <div class="sidebar-content" id="section-panes">
          <div id="sidebar-panes"></div>
        </div>
      </div>

      <div class="sidebar-section collapsed">
        <div class="sidebar-header" data-section="directories">📁 Directories <span class="collapse-icon">▼</span></div>
        <div class="sidebar-content" id="section-directories">
          <div id="sidebar-directories"></div>
          <div id="directories-empty" class="sidebar-empty-hint">Add project folders for quick access</div>
          <button id="sidebar-add-dir" class="sidebar-btn add-btn">+ Add Directory</button>
        </div>
      </div>

      <div class="sidebar-section collapsed">
        <div class="sidebar-header" data-section="commands">⌘ Commands <span class="collapse-icon">▼</span></div>
        <div class="sidebar-content" id="section-commands">
          <div id="sidebar-commands"></div>
          <div id="commands-empty" class="sidebar-empty-hint">Save commands to run them quickly</div>
          <button id="sidebar-add-cmd" class="sidebar-btn add-btn">+ Add Command</button>
        </div>
      </div>

      <div class="sidebar-section collapsed">
        <div class="sidebar-header" data-section="workspaces">📐 Workspaces <span class="collapse-icon">▼</span></div>
        <div class="sidebar-content" id="section-workspaces">
          <div id="sidebar-presets"></div>
          <button id="sidebar-save-preset" class="sidebar-btn add-btn">+ Save Current</button>
        </div>
      </div>

      <div class="sidebar-section collapsed">
        <div class="sidebar-header" data-section="pipes">⚡ Pipes <span class="collapse-icon">▼</span></div>
        <div class="sidebar-content" id="section-pipes">
          <div id="sidebar-pipes"></div>
          <button id="sidebar-toggle-pipe-mode" class="sidebar-btn add-btn">⚡ Pipe Mode</button>
        </div>
      </div>

      <div class="sidebar-section collapsed">
        <div class="sidebar-header" data-section="expo-manager">&#128241; Expo Manager <span class="collapse-icon">▼</span></div>
        <div class="sidebar-content" id="section-expo-manager">
          <button id="open-expo-dashboard" class="sidebar-btn expo-dashboard-btn">
            <span class="btn-icon">&#128187;</span>
            <span>Open Dashboard</span>
          </button>
          <button id="dev-mode-btn" class="sidebar-btn dev-mode-sidebar-btn">
            <span class="btn-icon">&#9889;</span>
            <span>Dev Mode (Side-by-Side)</span>
          </button>
          <div id="running-expo-servers" class="running-servers-list"></div>
        </div>
      </div>
    </div>

    <!-- Grid Container -->
    <div id="grid-container"></div>

    <!-- Pipe Mode SVG Overlay -->
    <svg id="pipe-overlay" class="pipe-overlay hidden"></svg>

    <!-- Pipe Mode Toolbar -->
    <div id="pipe-toolbar" class="pipe-toolbar hidden"></div>
  </div>

  <button id="add-terminal" title="New Pane (Cmd+T)" data-tooltip="Click for new terminal · Right-click for options">+</button>

  <!-- Launch Modal -->
  <div id="launch-modal" class="modal hidden">
    <div class="modal-content launch-modal-content">
      <h3>New Pane</h3>

      <div class="launch-section">
        <label class="input-label">Pane Type</label>
        <div class="pane-type-selector">
          <button class="pane-type-btn selected" data-type="terminal">Terminal</button>
          <button class="pane-type-btn" data-type="browser">Browser</button>
          <button class="pane-type-btn" data-type="expo">Expo Preview</button>
        </div>
      </div>

      <div class="launch-section browser-options hidden" id="browser-options">
        <label class="input-label">URL</label>
        <input type="text" id="browser-url" placeholder="https://example.com or localhost:3000">
      </div>

      <div class="launch-section expo-options hidden" id="expo-options">
        <label class="input-label">Expo Project</label>
        <div class="expo-project-selector">
          <select id="expo-project-select">
            <option value="">-- Scanning for projects... --</option>
          </select>
          <button type="button" id="scan-expo-projects" class="scan-btn" title="Scan for projects">&#8635;</button>
        </div>
        <label class="input-label">Or enter Metro URL manually</label>
        <input type="text" id="expo-url" placeholder="http://localhost:8081">
        <label class="checkbox-label">
          <input type="checkbox" id="expo-show-qr">
          <span>Show QR Code overlay</span>
        </label>
      </div>

      <div class="terminal-options" id="terminal-options">
        <div class="launch-section">
          <label class="input-label">AI Model</label>
          <div class="model-selector">
            <button class="model-btn selected" data-model="none">None</button>
            <button class="model-btn" data-model="claude">Claude</button>
            <button class="model-btn" data-model="codex">Codex</button>
          </div>
        </div>

      <div class="launch-section ai-options hidden" id="claude-options">
        <label class="checkbox-label" data-tooltip="Lets Claude make changes without asking for approval each time">
          <input type="checkbox" id="skip-permissions" checked>
          <span>--dangerously-skip-permissions</span>
        </label>
        <label class="checkbox-label" data-tooltip="Shows more detailed output from Claude">
          <input type="checkbox" id="claude-verbose">
          <span>--verbose</span>
        </label>
        <div class="startup-commands-label">Run on startup:</div>
        <label class="checkbox-label">
          <input type="checkbox" id="startup-compact">
          <span>/compact</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="startup-status">
          <span>/status</span>
        </label>
      </div>

      <div class="launch-section ai-options hidden" id="codex-options">
        <label class="checkbox-label">
          <input type="checkbox" id="codex-full-auto" checked>
          <span>--full-auto</span>
        </label>
      </div>

      <div class="launch-section">
        <label class="input-label">Directory</label>
        <select id="launch-directory">
          <option value="">Home (~)</option>
        </select>
      </div>
      </div><!-- end terminal-options -->

      <div class="launch-section">
        <label class="input-label">Pane Name</label>
        <input type="text" id="launch-name" placeholder="My Pane">
      </div>

      <div class="modal-buttons">
        <button id="cancel-launch" class="btn-secondary">Cancel</button>
        <button id="do-launch" class="btn-primary">Launch</button>
      </div>
    </div>
  </div>

  <!-- Add Item Modal (for commands/directories) -->
  <div id="add-modal" class="modal hidden">
    <div class="modal-content">
      <h3 id="modal-title">Add Command</h3>
      <input type="text" id="item-name" placeholder="Name">
      <label id="item-value-label" class="input-label">Command</label>
      <div id="item-value-wrapper" class="input-with-button">
        <input type="text" id="item-value" placeholder="Value">
        <button id="browse-folder" class="btn-browse hidden" title="Browse...">📁</button>
      </div>
      <div id="drop-hint" class="drop-hint hidden">Or drag a folder here</div>
      <div class="modal-buttons">
        <button id="cancel-modal" class="btn-secondary">Cancel</button>
        <button id="save-modal" class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <!-- Expo Dashboard Modal -->
  <div id="expo-dashboard-modal" class="modal hidden">
    <div class="modal-content dashboard-modal-content">
      <!-- Dashboard content rendered by ExpoDashboard class -->
    </div>
  </div>

  <!-- Pipe Flow Dashboard Modal -->
  <div id="pipe-flow-modal" class="modal hidden">
    <div class="modal-content flow-dashboard-content">
      <!-- Rendered by showPipeFlowDashboard() -->
    </div>
  </div>

  <!-- Command Palette (Cmd+K) -->
  <div id="command-palette-overlay" class="command-palette-overlay hidden">
    <div class="command-palette">
      <input type="text" id="command-palette-input" class="command-palette-input" placeholder="Search commands, directories, panes..." autocomplete="off">
      <div id="command-palette-results" class="command-palette-results"></div>
    </div>
  </div>

  <!-- Context Menu -->
  <div id="context-menu" class="context-menu hidden"></div>

  <!-- Onboarding Overlay -->
  <div id="onboarding-overlay" class="onboarding-overlay hidden">
    <div class="onboarding-card">
      <div class="onboarding-icon" id="onboarding-icon"></div>
      <h2 id="onboarding-title"></h2>
      <p id="onboarding-text"></p>
      <div class="onboarding-dots" id="onboarding-dots"></div>
      <button class="onboarding-btn" id="onboarding-next">Get Started</button>
      <br>
      <button class="onboarding-skip" id="onboarding-skip">Skip intro</button>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal settings-modal hidden">
    <div class="modal-content">
      <h3>Settings</h3>
      <div class="settings-section">
        <div class="settings-section-title">Terminal</div>
        <div class="settings-row">
          <label>Font Size</label>
          <input type="range" id="settings-font-size" class="settings-slider" min="11" max="18" value="14">
          <span id="settings-font-size-label" style="color:#888;font-size:12px;width:30px;text-align:right;">14px</span>
        </div>
        <div class="settings-row">
          <label>Theme</label>
          <select id="settings-theme" class="settings-select">
            <option value="dark">Dark</option>
            <option value="darker">Darker</option>
            <option value="light">Light</option>
          </select>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-section-title">Layout</div>
        <div class="settings-row">
          <label>Grid Spacing</label>
          <select id="settings-grid-gap" class="settings-select">
            <option value="2">Compact</option>
            <option value="6" selected>Normal</option>
            <option value="12">Spacious</option>
          </select>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-section-title">Defaults</div>
        <div class="settings-row">
          <label>Default AI Model</label>
          <select id="settings-default-model" class="settings-select">
            <option value="none">None</option>
            <option value="claude">Claude</option>
            <option value="codex">Codex</option>
          </select>
        </div>
        <div class="settings-row">
          <label>Restore last session on start</label>
          <input type="checkbox" id="settings-auto-restore" style="width:16px;height:16px;accent-color:#6cb6ff;">
        </div>
      </div>
      <div class="modal-buttons">
        <button id="settings-cancel" class="btn-secondary">Cancel</button>
        <button id="settings-save" class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="renderer.js"></script>
</body>
</html>
